apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hello-world-php
  name: hello-world-php
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hello-world-php
  strategy: {}
  template:
    metadata:
      labels:
        app: hello-world-php
    spec:
      containers:
      - image: hello-world-php
        name: hello-world-php
        resources: {}
        imagePullPolicy: Never  # Diese Zeile wurde hinzugefügt
status: {}